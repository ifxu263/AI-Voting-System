<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vote Submitted</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='Style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <script>
      Swal.fire({
        title: "✅ Vote Submitted!",
        text: "Thank you for voting. Please wait for the results.",
        icon: "success",
        showConfirmButton: false,
        timer: 3000,
      });
    </script>

    <div class="container">
      <h1>🎉 Vote Recorded</h1>
      <p>Your vote has been successfully recorded.</p>
      <a href="{{ url_for('logout') }}" class="btn">🚪 Exit</a>
    </div>
  </body>
</html>
